<div class="card">
    <div class="card-header" [ngClass]="{
    'red': (position + 1) % 3 === 0,
    'blue': (position + 1) % 3 === 1,
    'green': (position + 1) % 3 === 2
  }">
        My Heading
    </div>
    <div class="card-body" (click)="sendData()">
        Name : {{data2.name}}
        <p>age: {{data2.age}}</p>
        position : {{position}}
    </div>
</div>
