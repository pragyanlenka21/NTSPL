<div class="card" >
    <div class="card-header" [ngClass]="{
    'red': (position + 1) % 3 === 0,
    'blue': (position + 1) % 3 === 1,
    'green': (position + 1) % 3 === 2
  }">
        <h4>{{heading}} ({{position}})</h4>
    </div>
    <div class="card-body">
        <p>{{text}}</p>
    </div>
    <div class="card-footer">
        <button class="btn btn-success" (click)="sendData2(heading)">Submit</button>
    </div>
</div>
